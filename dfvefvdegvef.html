<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍓 Strawberry Orders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff5f5;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      color: #c0392b;
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* ── Login screen ── */
    #login-screen {
      max-width: 380px;
      margin: 3rem auto;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    #login-screen h2 {
      color: #c0392b;
      margin-bottom: 1.5rem;
      font-size: 1.3rem;
      text-align: center;
    }

    .login-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: 2px solid #e74c3c;
      border-radius: 10px;
      background: white;
      color: #e74c3c;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #e74c3c;
      color: white;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .form-group select,
    .form-group input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .form-group select:focus,
    .form-group input[type="password"]:focus {
      border-color: #e74c3c;
    }

    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .login-btn:hover { background: #c0392b; }

    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    /* ── App screen ── */
    #app-screen { display: none; }

    .topbar {
      max-width: 900px;
      margin: 0 auto 1.5rem auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar .who {
      font-size: 0.95rem;
      color: #555;
    }

    .topbar .who strong { color: #c0392b; }

    .logout-btn {
      padding: 0.4rem 1rem;
      background: white;
      border: 1.5px solid #e74c3c;
      border-radius: 8px;
      color: #e74c3c;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: #fde8e8; }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto 2rem auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-top: 4px solid #e74c3c;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card.locked {
      border-top-color: #ccc;
      opacity: 0.7;
    }

    .card h2 { color: #c0392b; font-size: 1.2rem; }
    .card.locked h2 { color: #999; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-row label { font-size: 0.95rem; color: #333; }

    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider { background-color: #e74c3c; }
    input:checked + .slider:before { transform: translateX(22px); }

    input:disabled + .slider { cursor: not-allowed; opacity: 0.5; }

    .quantity-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .quantity-row label { font-size: 0.9rem; color: #555; }

    .qty-control { display: flex; align-items: center; gap: 0.5rem; }

    .qty-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: #fde8e8;
      color: #c0392b;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qty-btn:hover { background: #f5b7b7; }
    .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .qty-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: #c0392b;
      min-width: 28px;
      text-align: center;
    }

    .no-order { color: #aaa; font-size: 0.85rem; font-style: italic; }
    .locked-note { color: #bbb; font-size: 0.8rem; font-style: italic; }

    /* ── Summary ── */
    .summary {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .summary h2 { color: #c0392b; margin-bottom: 1rem; font-size: 1.2rem; }

    .summary-table { width: 100%; border-collapse: collapse; }

    .summary-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      background: #fde8e8;
      color: #c0392b;
      font-size: 0.9rem;
    }

    .summary-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.95rem;
      color: #333;
    }

    .summary-table tr:last-child td { border-bottom: none; }

    .total-row td {
      font-weight: bold;
      color: #c0392b;
      border-top: 2px solid #fde8e8;
      padding-top: 0.75rem;
    }

    .empty-msg { color: #aaa; font-style: italic; font-size: 0.9rem; }

    .reset-btn {
      display: block;
      margin: 1.5rem auto 0 auto;
      padding: 0.65rem 2rem;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-btn:hover { background: #c0392b; }

    /* ── Change password (admin) ── */
    .admin-tools {
      max-width: 900px;
      margin: 1.5rem auto 0 auto;
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .admin-tools h2 { color: #c0392b; margin-bottom: 1rem; font-size: 1.1rem; }

    .pwd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .pwd-item label { display: block; font-size: 0.8rem; color: #777; margin-bottom: 0.3rem; }

    .pwd-item input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .pwd-item input:focus { outline: none; border-color: #e74c3c; }

    .save-pwd-btn {
      margin-top: 1rem;
      padding: 0.55rem 1.5rem;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-pwd-btn:hover { background: #c0392b; }
    .save-msg { font-size: 0.85rem; color: #27ae60; margin-top: 0.5rem; }
  </style>
</head>
<body>

<h1>🍓 Strawberry Orders</h1>
<p class="subtitle">Apartment strawberry basket ordering</p>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <h2>🔒 Sign In</h2>
  <div class="login-tabs">
    <button class="tab-btn active" onclick="setLoginMode('tenant')">I'm a Tenant</button>
    <button class="tab-btn" onclick="setLoginMode('admin')">Admin</button>
  </div>

  <div id="tenant-fields">
    <div class="form-group">
      <label>Select your apartment</label>
      <select id="apt-select">
        <option value="1">Apartment 1</option>
        <option value="2">Apartment 2</option>
        <option value="3">Apartment 3</option>
        <option value="4">Apartment 4</option>
      </select>
    </div>
    <div class="form-group">
      <label>Your PIN</label>
      <input type="password" id="tenant-pwd" placeholder="Enter PIN" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
  </div>

  <div id="admin-fields" style="display:none">
    <div class="form-group">
      <label>Admin password</label>
      <input type="password" id="admin-pwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
  </div>

  <button class="login-btn" onclick="doLogin()">Sign In</button>
  <p class="error-msg" id="login-error"></p>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <span class="who" id="who-label"></span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>

  <div class="cards" id="apartments"></div>

  <div class="summary">
    <h2>📋 Order Summary</h2>
    <div id="summary-content"></div>
  </div>

  <!-- Admin-only: reset + change passwords -->
  <div id="admin-only" style="display:none">
    <div style="text-align:center">
      <button class="reset-btn" onclick="resetAll()">Reset All Orders</button>
    </div>

    <div class="admin-tools">
      <h2>🔑 Change Passwords</h2>
      <div class="pwd-grid" id="pwd-grid"></div>
      <button class="save-pwd-btn" onclick="savePasswords()">Save Passwords</button>
      <p class="save-msg" id="save-msg"></p>
    </div>
  </div>
</div>

<script>
  // ── Default passwords (stored in localStorage so admin can change them) ──
  const STORAGE_KEY = 'strawberry_passwords';

  function loadPasswords() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
    return {
      admin: 'admin123',
      1: '1111',
      2: '2222',
      3: '3333',
      4: '4444'
    };
  }

  function savePasswords() {
    const inputs = document.querySelectorAll('.pwd-input');
    inputs.forEach(input => {
      const key = input.dataset.key;
      if (input.value.trim() !== '') {
        passwords[key] = input.value.trim();
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(passwords));
    document.getElementById('save-msg').textContent = '✓ Passwords saved!';
    setTimeout(() => document.getElementById('save-msg').textContent = '', 2500);
    // clear inputs
    inputs.forEach(i => i.value = '');
  }

  let passwords = loadPasswords();

  // ── Order state (persisted in localStorage) ──
  const ORDER_KEY = 'strawberry_orders';

  function loadOrders() {
    const saved = localStorage.getItem(ORDER_KEY);
    if (saved) return JSON.parse(saved);
    return { 1: { wants: false, qty: 1 }, 2: { wants: false, qty: 1 }, 3: { wants: false, qty: 1 }, 4: { wants: false, qty: 1 } };
  }

  function persistOrders() {
    localStorage.setItem(ORDER_KEY, JSON.stringify(state));
  }

  let state = loadOrders();

  const apartments = [
    { id: 1, name: 'Apartment 1' },
    { id: 2, name: 'Apartment 2' },
    { id: 3, name: 'Apartment 3' },
    { id: 4, name: 'Apartment 4' },
  ];

  // ── Session ──
  let session = null; // { role: 'admin' } or { role: 'tenant', id: 1 }

  // ── Login UI ──
  let loginMode = 'tenant';

  function setLoginMode(mode) {
    loginMode = mode;
    document.getElementById('tenant-fields').style.display = mode === 'tenant' ? '' : 'none';
    document.getElementById('admin-fields').style.display = mode === 'admin' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && mode === 'tenant') || (i === 1 && mode === 'admin'));
    });
    document.getElementById('login-error').textContent = '';
  }

  function doLogin() {
    passwords = loadPasswords(); // refresh in case changed
    const err = document.getElementById('login-error');
    err.textContent = '';

    if (loginMode === 'admin') {
      const pwd = document.getElementById('admin-pwd').value;
      if (pwd === passwords.admin) {
        session = { role: 'admin' };
        showApp();
      } else {
        err.textContent = 'Wrong admin password.';
        document.getElementById('admin-pwd').value = '';
      }
    } else {
      const id = parseInt(document.getElementById('apt-select').value);
      const pwd = document.getElementById('tenant-pwd').value;
      if (pwd === passwords[id]) {
        session = { role: 'tenant', id };
        showApp();
      } else {
        err.textContent = 'Wrong PIN for this apartment.';
        document.getElementById('tenant-pwd').value = '';
      }
    }
  }

  function logout() {
    session = null;
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = '';
    document.getElementById('admin-pwd').value = '';
    document.getElementById('tenant-pwd').value = '';
    document.getElementById('login-error').textContent = '';
    setLoginMode('tenant');
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = '';

    if (session.role === 'admin') {
      document.getElementById('who-label').innerHTML = 'Logged in as <strong>Admin</strong>';
      document.getElementById('admin-only').style.display = '';
      renderPwdGrid();
    } else {
      const apt = apartments.find(a => a.id === session.id);
      document.getElementById('who-label').innerHTML = `Logged in as <strong>${apt.name}</strong>`;
      document.getElementById('admin-only').style.display = 'none';
    }

    render();
  }

  // ── Render cards ──
  function render() {
    renderCards();
    renderSummary();
  }

  function canEdit(aptId) {
    if (!session) return false;
    if (session.role === 'admin') return true;
    return session.role === 'tenant' && session.id === aptId;
  }

  function renderCards() {
    const container = document.getElementById('apartments');
    container.innerHTML = '';

    apartments.forEach(apt => {
      const s = state[apt.id];
      const editable = canEdit(apt.id);

      const card = document.createElement('div');
      card.className = 'card' + (editable ? '' : ' locked');

      card.innerHTML = `
        <h2>🏠 ${apt.name}</h2>
        <div class="toggle-row">
          <label>Wants strawberries?</label>
          <label class="switch">
            <input type="checkbox" ${s.wants ? 'checked' : ''} ${editable ? '' : 'disabled'}
              onchange="toggleWants(${apt.id}, this.checked)" />
            <span class="slider"></span>
          </label>
        </div>
        ${s.wants
          ? `<div class="quantity-row">
              <label>Baskets:</label>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${apt.id}, -1)" ${s.qty <= 1 || !editable ? 'disabled' : ''}>−</button>
                <span class="qty-value">${s.qty}</span>
                <button class="qty-btn" onclick="changeQty(${apt.id}, 1)" ${editable ? '' : 'disabled'}>+</button>
              </div>
            </div>`
          : editable
            ? `<p class="no-order">No order yet</p>`
            : `<p class="locked-note">🔒 No order</p>`
        }
      `;

      container.appendChild(card);
    });
  }

  function renderSummary() {
    const container = document.getElementById('summary-content');
    const orders = apartments.filter(a => state[a.id].wants);

    if (orders.length === 0) {
      container.innerHTML = '<p class="empty-msg">No orders yet.</p>';
      return;
    }

    const total = orders.reduce((sum, a) => sum + state[a.id].qty, 0);

    const rows = orders.map(a => `
      <tr>
        <td>🏠 ${a.name}</td>
        <td>${state[a.id].qty} basket${state[a.id].qty > 1 ? 's' : ''}</td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table class="summary-table">
        <thead><tr><th>Apartment</th><th>Baskets</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td>Total</td>
            <td>${total} basket${total > 1 ? 's' : ''}</td>
          </tr>
        </tbody>
      </table>
    `;
  }

  function renderPwdGrid() {
    const grid = document.getElementById('pwd-grid');
    grid.innerHTML = '';

    const items = [
      { key: 'admin', label: 'Admin password' },
      { key: '1', label: 'Apartment 1 PIN' },
      { key: '2', label: 'Apartment 2 PIN' },
      { key: '3', label: 'Apartment 3 PIN' },
      { key: '4', label: 'Apartment 4 PIN' },
    ];

    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'pwd-item';
      div.innerHTML = `
        <label>${item.label}</label>
        <input type="password" class="pwd-input" data-key="${item.key}" placeholder="Leave blank to keep current" />
      `;
      grid.appendChild(div);
    });
  }

  // ── State mutations ──
  function toggleWants(id, value) {
    if (!canEdit(id)) return;
    state[id].wants = value;
    if (!value) state[id].qty = 1;
    persistOrders();
    render();
  }

  function changeQty(id, delta) {
    if (!canEdit(id)) return;
    const newQty = state[id].qty + delta;
    if (newQty >= 1) {
      state[id].qty = newQty;
      persistOrders();
      render();
    }
  }

  function resetAll() {
    if (session?.role !== 'admin') return;
    apartments.forEach(a => { state[a.id] = { wants: false, qty: 1 }; });
    persistOrders();
    render();
  }
</script>
</body>
</html>
