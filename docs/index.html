<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e05070">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Strawberries">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>🍓 Strawberry Orders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1a0005; }
    iframe { width: 100%; height: 100%; border: none; }
    #install-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: linear-gradient(135deg, #8b1a2a, #e05070);
      padding: 14px 20px; display: none;
      align-items: center; justify-content: space-between;
      font-family: 'Inter', sans-serif; color: #fff; font-size: 14px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
      animation: slideUp 0.3s ease;
    }
    #install-bar button {
      background: #fff; color: #8b1a2a; border: none;
      padding: 8px 20px; border-radius: 10px; font-weight: 700;
      cursor: pointer; font-size: 14px;
    }
    #install-bar .dismiss {
      background: transparent; color: rgba(255,255,255,0.7);
      padding: 8px; font-size: 20px; cursor: pointer; border: none;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #1a0005; z-index: 100;
      font-family: 'Inter', sans-serif; color: #fff;
      flex-direction: column; gap: 12px;
    }
    #loading .emoji { font-size: 3rem; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
  </style>
</head>
<body>

<div id="loading">
  <span class="emoji">🍓</span>
  <span>Loading...</span>
</div>

<iframe
  id="app"
  src="https://scrapyduckstudio-strawbry-order.streamlit.app"
  allow="notifications; clipboard-write"
  onload="document.getElementById('loading').style.display='none'"
></iframe>

<div id="install-bar">
  <span>📱 Install for push notifications</span>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="install-btn">Install</button>
    <button class="dismiss" id="dismiss-btn">&times;</button>
  </div>
</div>

<script>
// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW error:', err));
}

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// PWA install prompt
let deferredPrompt;
const bar = document.getElementById('install-bar');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  bar.style.display = 'flex';
});

installBtn.addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      bar.style.display = 'none';
    });
  }
});

dismissBtn.addEventListener('click', () => {
  bar.style.display = 'none';
});

// Listen for messages from iframe (new order notifications)
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'new-order') {
    if ('Notification' in window && Notification.permission === 'granted') {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification('🍓 New Order!', {
          body: `Apartment ${event.data.apt} — ${event.data.total} NOK`,
          icon: './icon-192.png',
          tag: 'order-' + event.data.apt,
          vibrate: [200, 100, 200],
          requireInteraction: true,
        });
      });
    }
  }
});
</script>
</body>
</html>
